<!DOCTYPE html>

    <style>
        body {
            background-color: #fff7f0;
        }

        /* Aktif ana menü butonu */
        .admin-menu-button.active {
            background: linear-gradient(135deg, #ef4444, #f97316);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        /* Aktif sol menü butonu */
        .tab-button.active {
            background: linear-gradient(135deg, #f97316, #f59e0b);
            color: white;
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.2);
        }

        /* Sıralama Modülü İçin Stiller */
        .sortable-item {
            cursor: grab;
        }

        .sortable-item:active {
            cursor: grabbing;
        }

        .sortable-ghost {
            opacity: 0.4;
            background: #ffe6cc;
            border: 2px dashed #fb923c;
        }

        /* Kampanya Görseli Önizlemeleri */
        .campaign-image-preview {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 0.5rem;
            margin-top: 0.75rem;
            border: 1px solid #d1d5db;
        }

        .price-box-preview-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 50%;
            margin-top: 8px;
            border: 2px solid #fb923c;
            background-color: white;
            padding: 5px;
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }
    </style>
</head>

<body class="text-gray-800 antialiased font-sans">

    <script>
        // --- Firebase Yapılandırması ---
        const firebaseConfig = {
            apiKey: "AIzaSyDcYNF0hMow-y1MuV3GXLG9vY_MK0tJTGs",
            authDomain: "olimpiyatkokorecmenu.firebaseapp.com",
            projectId: "olimpiyatkokorecmenu",
            messagingSenderId: "987017604417",
            appId: "1:987017604417:web:b6c4858712dc66d14745c0",
            databaseURL: "https://olimpiyatkokorecmenu-default-rtdb.europe-west1.firebasedatabase.app"
        };
        const CLOUDINARY_CLOUD_NAME = 'dtkrwqofx';
        const CLOUDINARY_UPLOAD_PRESET = 'olimpiyat_menu';

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const inPlaceProductsPath = 'products';
        const inPlaceCampaignsPath = 'campaigns';
        const inPlaceCampaignInfoPath = 'campaign_info';
        const deliveryProductsPath = 'delivery_products';
        const deliveryCampaignsPath = 'delivery_campaigns';
        const deliveryCampaignInfoPath = 'delivery_campaign_info';
        const visitorsPath = 'visitors';

        let currentMenuType = 'in_place';
        let productsRef;
        let campaignsRef;
        let campaignInfoRef;
        let priceBoxUrlRef;
        let visitorsRef = database.ref(visitorsPath);

        let products = [];
        let campaignUrls = [];
        let campaignPriceText = "";
        let campaignPriceBoxUrl = "";
        const categoriesTR = ['Menüler', 'Kokoreç', 'Tavuk Kokoreç', 'Tavuk Döner', 'Patso', 'Köfte', 'Ciğer', 'Hamburger', 'Tost', 'Midye', 'Yan Lezzetler', 'İçecekler'];

        const contentContainer = document.getElementById('contentContainer');
        const showProductsBtn = document.getElementById('showProducts');
        const showSortingBtn = document.getElementById('showSorting');
        const showCampaignsBtn = document.getElementById('showCampaigns');
        const showAddProductBtn = document.getElementById('showAddProduct');
        const showBulkUpdateBtn = document.getElementById('showBulkUpdate');
        const showStatsBtn = document.getElementById('showStats');
        const tabButtons = document.querySelectorAll('.tab-button');
        const adminMenuButtons = document.querySelectorAll('.admin-menu-button');
        const editProductModal = document.getElementById('editProductModal');
        const closeEditProductModal = document.getElementById('closeEditProductModal');
        const editImageURLInput = document.getElementById('editImageURL');
        const editImagePreview = document.getElementById('editImagePreview');
        const uploadEditImageBtn = document.getElementById('uploadEditImageBtn');
        const saveEditProductButton = document.getElementById('saveEditProduct');

        function setFirebaseRefs(menuType) {
            currentMenuType = menuType;
            if (menuType === 'in_place') {
                productsRef = database.ref(inPlaceProductsPath);
                campaignsRef = database.ref(inPlaceCampaignsPath);
                campaignInfoRef = database.ref(inPlaceCampaignInfoPath);
            } else {
                productsRef = database.ref(deliveryProductsPath);
                campaignsRef = database.ref(deliveryCampaignsPath);
                campaignInfoRef = database.ref(deliveryCampaignInfoPath);
            }
            priceBoxUrlRef = campaignInfoRef.child('price_box_url');
            updateMenuButtonState(menuType);
            stopAllListeners();
            setupDataListeners();
            refreshActiveModule();
        }

        function refreshActiveModule() {
            const activeTab = document.querySelector('.tab-button.active');
            if (activeTab) {
                const activeId = activeTab.id;
                if (activeId === 'showProducts') {
                    const filterSelect = document.getElementById('filterCategory');
                    renderProductList(filterSelect ? filterSelect.value : 'Tümü');
                } else if (activeId === 'showBulkUpdate') {
                    const bulkSelect = document.getElementById('bulkCategory');
                    renderBulkPriceList(bulkSelect ? bulkSelect.value : 'Tümü');
                } else if (activeId === 'showSorting') {
                    const sortSelect = document.getElementById('sortCategory');
                    if (sortSelect && sortSelect.value) loadSortableList(sortSelect.value);
                }
            } else {
                renderProductsModule();
            }
        }

        function updateMenuButtonState(menuType) {
            adminMenuButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.menu === menuType) btn.classList.add('active');
            });
            const copyContainer = document.getElementById('copyToDeliveryContainer');
            if (menuType === 'delivery') copyContainer.classList.remove('hidden');
            else copyContainer.classList.add('hidden');
        }

        async function copyMenuDataToDelivery() {
            if (currentMenuType !== 'delivery') return;
            if (!confirm("Yerinde Menü verileri Paket Servis Menüsüne akıllı olarak aktarılacak:\n\n- Paket serviste zaten var olan ürünlerin MEVCUT FİYATLARI KORUNACAK, diğer bilgileri güncellenecektir.\n- Paket serviste olmayan ürünler fiyatıyla beraber eklenecektir.\n\nDevam etmek istiyor musunuz?")) return;

            const sourceProductsRef = database.ref(inPlaceProductsPath);
            const sourceCampaignsRef = database.ref(inPlaceCampaignsPath);
            const sourceCampaignInfoRef = database.ref(inPlaceCampaignInfoPath);
            const targetProductsRef = database.ref(deliveryProductsPath);
            const targetCampaignsRef = database.ref(deliveryCampaignsPath);
            const targetCampaignInfoRef = database.ref(deliveryCampaignInfoPath);

            try {
                const targetSnapshot = await targetProductsRef.once('value');
                const targetProductsData = targetSnapshot.val() || {};
                const sourceSnapshot = await sourceProductsRef.once('value');
                const sourceProductsData = sourceSnapshot.val() || {};

                const targetByName = {};
                Object.keys(targetProductsData).forEach(key => {
                    const p = targetProductsData[key];
                    if (p && p.name) targetByName[p.name.trim().toLowerCase()] = { key: key, price: p.price };
                });

                const updatedTargetProducts = { ...targetProductsData };
                Object.keys(sourceProductsData).forEach(sourceKey => {
                    const sourceProduct = sourceProductsData[sourceKey];
                    if (!sourceProduct || !sourceProduct.name) return;

                    const sourceNameKey = sourceProduct.name.trim().toLowerCase();
                    const existingTarget = targetByName[sourceNameKey];

                    if (existingTarget) {
                        updatedTargetProducts[existingTarget.key] = {
                            ...sourceProduct,
                            price: existingTarget.price,
                            lastUpdated: sourceProduct.lastUpdated || Date.now()
                        };
                    } else {
                        const finalKey = updatedTargetProducts[sourceKey] ? database.ref().child(deliveryProductsPath).push().key : sourceKey;
                        updatedTargetProducts[finalKey] = { ...sourceProduct, lastUpdated: Date.now() };
                    }
                });

                await targetProductsRef.set(updatedTargetProducts);
                let snapshot = await sourceCampaignsRef.once('value');
                await targetCampaignsRef.set(snapshot.val() || {});
                snapshot = await sourceCampaignInfoRef.once('value');
                await targetCampaignInfoRef.set(snapshot.val() || {});

                alert("Veriler akıllı kopyalama sistemiyle başarıyla aktarıldı!");
                setFirebaseRefs('delivery');
            } catch (error) { alert("Hata: " + error.message); }
        }

        function setActiveTab(buttonId) {
            tabButtons.forEach(btn => btn.classList.remove('active'));
            const targetBtn = document.getElementById(buttonId);
            if (targetBtn) targetBtn.classList.add('active');
        }

        function loadModule(htmlContent) {
            contentContainer.innerHTML = htmlContent;
        }

        function openCloudinaryWidget(urlInput, previewImg, uploadPreset = CLOUDINARY_UPLOAD_PRESET) {
            if (!CLOUDINARY_CLOUD_NAME || !uploadPreset) { alert("Hata: Cloudinary ayarları eksik."); return; }
            const widget = window.cloudinary.createUploadWidget(
                { cloudName: CLOUDINARY_CLOUD_NAME, uploadPreset: uploadPreset, sources: ['local', 'url', 'camera'] },
                (error, result) => {
                    if (!error && result && result.event === "success") {
                        const url = result.info.secure_url;
                        urlInput.value = url;
                        previewImg.src = url;
                        previewImg.classList.remove('hidden');
                        alert("Görsel yüklendi ve URL kaydedildi.");
                    } else if (error) { alert("Görsel yüklenirken bir hata oluştu: " + error.message); }
                }
            );
            widget.open();
        }

        async function updateProductInFirebase(key, updates) { await productsRef.child(key).update(updates); }
        async function deleteProductFromFirebase(key) { await productsRef.child(key).remove(); }
        async function deleteCampaignUrl(key) { await campaignsRef.child(key).remove(); }
        function sortProductsByOrder(productsArray) { return productsArray.sort((a, b) => (a.order === undefined ? 9999 : a.order) - (b.order === undefined ? 9999 : b.order)); }

        // --- MODÜLLERİN YÜKLENMESİ ---
        function renderProductsModule() {
            setActiveTab('showProducts');
            const menuTitle = currentMenuType === 'in_place' ? 'Yerinde Menü' : 'Paket Servis Menüsü';
            loadModule(`
                <div class="bg-white rounded-2xl shadow-sm p-4 sm:p-6 border border-orange-100 animate-pop-in">
                    <h2 class="text-2xl font-black text-gray-800 mb-4 flex items-center gap-1">📦 ${menuTitle} Ürün Yönetimi</h2>
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Kategoriye Göre Filtrele</label>
                        <select id="filterCategory" class="border-2 border-gray-100 p-2.5 rounded-xl w-full text-sm font-semibold bg-gray-50 outline-none focus:border-orange-500">
                            <option value="Tümü">Tüm Kategoriler</option>
                            ${categoriesTR.map(cat => `<option value="${cat}">${cat}</option>`).join('')}
                        </select>
                    </div>
                    <ul id="productList" class="flex flex-col gap-2.5">
                        <li class="p-4 text-center text-gray-400 text-sm">Ürünler yükleniyor...</li>
                    </ul>
                </div>
            `);
            const filterSelect = document.getElementById('filterCategory');
            filterSelect.addEventListener('change', () => renderProductList(filterSelect.value));
            if (products.length > 0) renderProductList(filterSelect.value);
        }

        function renderProductList(filter = 'Tümü') {
            const listEl = document.getElementById('productList');
            if (!listEl) return;
            listEl.innerHTML = '';

            const sortedProducts = sortProductsByOrder([...products]);
            const filtered = filter === 'Tümü' ? sortedProducts : sortedProducts.filter(p => p.category === filter);

            if (filtered.length === 0) {
                listEl.innerHTML = '<li class="p-4 text-center bg-gray-50 rounded-xl text-gray-400 text-sm border border-dashed">Bu kategoride henüz ürün bulunmamaktadır.</li>';
                return;
            }

            filtered.forEach((p) => {
                const item = document.createElement('li');
                item.className = 'flex flex-col sm:flex-row justify-between sm:items-center bg-gray-50 p-3.5 rounded-xl border border-gray-100 gap-3 hover:bg-gray-100/50 transition';
                item.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-gray-800 text-sm sm:text-base">${p.name}</span>
                        <span class="text-xs font-bold text-orange-600 mt-0.5 bg-orange-100 px-2 py-0.5 rounded-md w-fit">${p.category}</span>
                    </div>
                    <div class="flex items-center justify-between sm:justify-end gap-3 border-t sm:border-t-0 pt-2.5 sm:pt-0 border-gray-200/60">
                        <span class="text-sm font-black text-gray-700 bg-white border px-3 py-1.5 rounded-lg shadow-sm">${p.price} ₺</span>
                        <div class="flex gap-2">
                            <button data-key="${p.key}" class="editBtn bg-amber-500 text-white px-3 py-1.5 rounded-xl text-xs font-bold shadow-sm active:scale-95 transition">Düzenle</button>
                            <button data-key="${p.key}" class="deleteBtn bg-red-500 text-white px-3 py-1.5 rounded-xl text-xs font-bold shadow-sm active:scale-95 transition">Sil</button>
                        </div>
                    </div>
                `;
                listEl.appendChild(item);
            });

            document.querySelectorAll('.deleteBtn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const productKeyToDelete = e.target.dataset.key;
                    if (confirm("Bu ürünü silmek istediğinizden emin misiniz?")) {
                        try { await deleteProductFromFirebase(productKeyToDelete); alert("Ürün silindi."); }
                        catch (error) { alert("Hata: " + error.message); }
                    }
                });
            });
            document.querySelectorAll('.editBtn').forEach(btn => btn.addEventListener('click', (e) => openEditModal(e.target.dataset.key)));
        }

        async function saveSortingOrder() {
            const listEl = document.getElementById('sortableList');
            const items = listEl.children;
            const updates = {};
            const statusEl = document.getElementById('sortingStatus');
            let changesMade = 0;
            const pathPrefix = currentMenuType === 'in_place' ? inPlaceProductsPath : deliveryProductsPath;

            if (items.length === 0) return;

            for (let i = 0; i < items.length; i++) {
                const productKey = items[i].dataset.id;
                const newOrderValue = i;
                const currentProduct = products.find(p => p.key === productKey);

                if (currentProduct && currentProduct.order !== newOrderValue) {
                    updates[`${pathPrefix}/${productKey}/order`] = newOrderValue;
                    changesMade++;
                }
            }

            if (changesMade === 0) {
                statusEl.textContent = 'Herhangi bir sıralama değişikliği yapılmadı.';
                statusEl.className = 'mt-3 text-center text-xs font-bold text-emerald-600';
                statusEl.classList.remove('hidden');
                return;
            }

            if (!confirm(`${changesMade} ürünün sırası güncellenecektir. Onaylıyor musunuz?`)) return;

            try {
                await database.ref().update(updates);
                statusEl.textContent = 'Yeni sıralama düzeni başarıyla kaydedildi!';
                statusEl.className = 'mt-3 text-center text-xs font-bold text-emerald-600';
                statusEl.classList.remove('hidden');

                statusEl.textContent = 'Hata: ' + error.message;
                statusEl.className = 'mt-3 text-center text-xs font-bold text-red-600';
                statusEl.classList.remove('hidden');
            }

        // Kampanya listesindeki tüm input alanlarına toplu zam/indirim yansıtır
        function applyBulkCampaignAdjustment() {
            const value = parseFloat(document.getElementById('bulkCampaignAdjustmentValue').value);
            const statusEl = document.getElementById('campaignSortingStatus');
            if (isNaN(value) || value === 0) { alert('Lütfen geçerli bir miktar giriniz.'); return; }

            const priceInputs = document.querySelectorAll('#sortableCampaignList .campaign-price-edit');
            let count = 0;

            priceInputs.forEach(input => {
                // Mevcut input değerindeki sayısal kısmı ayıkla (örn: "250 TL" -> 250)
                let currentPrice = parseFloat(input.value.replace(/[^0-9.-]/g, '')) || 0;
                let newPrice = Math.max(0, currentPrice + value);
                
                // Yeni fiyatı formatıyla inputa yaz
                input.value = newPrice;
                count++;
            });

            statusEl.textContent = `Fiyatlar geçici olarak ${count} afiş için listeye yansıtıldı. Kalıcı olması için alttaki siyah butona basın.`;

        // TOPLU KAYDETME: Hem Sıralamayı Hem de Sihirbazla Değişen Tüm Fiyatları Tek Seferde Veritabanına İşler
        async function saveAllCampaignChanges() {
            const listEl = document.getElementById('sortableCampaignList');
            const items = listEl.children;
            const updates = {};
            const statusEl = document.getElementById('campaignSortingStatus');
            let changesMade = 0;
            const pathPrefix = currentMenuType === 'in_place' ? inPlaceCampaignsPath : deliveryCampaignsPath;

            if (items.length === 0) return;

            for (let i = 0; i < items.length; i++) {
                const campaignKey = items[i].dataset.id;
                const newOrderValue = i;
                // Kullanıcının veya sihirbazın girdiği yeni değeri al ve temizle
                const newPriceValue = items[i].querySelector('.campaign-price-edit').value.trim();
                
                const currentCampaign = campaignUrls.find(c => c.key === campaignKey);

                if (currentCampaign) {
                    // Sıralama değiştiyse ekle
                    if (currentCampaign.order !== newOrderValue) {
                        updates[`${pathPrefix}/${campaignKey}/order`] = newOrderValue;
                        changesMade++;
                    }
                    // Fiyat girdisi değiştiyse ekle
                    if ((currentCampaign.price || "") !== newPriceValue) {
                        updates[`${pathPrefix}/${campaignKey}/price`] = newPriceValue;
                        changesMade++;
                    }
                }
            }

            if (changesMade === 0) {
                statusEl.textContent = 'Herhangi bir fiyat veya sıralama değişikliği tespit edilmedi.';
                statusEl.className = 'mt-2 text-center text-xs font-bold text-green-600';
                statusEl.classList.remove('hidden');
                return;
            }

            if (!confirm(`Yaptığınız ${changesMade} değişiklik veritabanına işlenecektir. Onaylıyor musunuz?`)) return;

            try {
                await database.ref().update(updates);
                statusEl.textContent = 'Tüm kampanya sıralamaları ve fiyatları başarıyla güncellendi!';
                statusEl.className = 'mt-2 text-center text-xs font-bold text-green-600';
                statusEl.classList.remove('hidden');
            } catch (error) {
                statusEl.textContent = 'Güncelleme başarısız oldu: ' + error.message;
                statusEl.className = 'mt-2 text-center text-xs font-bold text-red-600';
                statusEl.classList.remove('hidden');
            }
        }

            document.getElementById('addProduct').addEventListener('click', addProduct);
        }

        async function addProduct() {
            const name = document.getElementById('productName').value.trim();
            const nameEN = document.getElementById('productNameEN').value.trim();
            const desc = document.getElementById('productDesc').value.trim();
            const descEN = document.getElementById('productDescEN').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const category = document.getElementById('productCategory').value;
            let imageURL = document.getElementById('productImageURL').value.trim();

            if (!name || isNaN(price) || !category) { alert('Lütfen zorunlu alanları (*) doldurunuz.'); return; }

            const maxOrder = products.length > 0 ? Math.max(...products.map(p => p.order === undefined ? 0 : p.order)) : 0;
            const newProduct = { name, nameEN: nameEN || name, desc, descEN: descEN || desc, price, image: imageURL, category, lastUpdated: Date.now(), order: maxOrder + 1 };

            try {
                await productsRef.push(newProduct);
                alert(`"${name}" başarıyla menüye eklendi.`);
                renderAddProductModule();
            } catch (error) { alert("Hata: " + error.message); }
        }

        function renderBulkUpdateModule() {
            setActiveTab('showBulkUpdate');

            loadModule(`

                    <div class="border-2 border-gray-100 p-4 mb-6 rounded-xl bg-gray-50/50">

                        </div>
                        <button id="applyBulkAdjustment" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl text-xs font-bold shadow-sm hover:bg-blue-700 transition w-full">Değerleri Aşağıdaki Listeye Yansıt</button>
                    </div>

                    <h3 class="font-bold text-lg mb-2 text-gray-800">Fiyat Listesi</h3>
                    <div class="hidden sm:flex font-bold text-[11px] uppercase tracking-wider bg-gray-100 p-2.5 rounded-xl mb-2 text-gray-500">
                        <span class="w-2/5">Ürün Adı</span>
                        <span class="w-1/5 text-right pr-4">Eski Fiyat</span>
                        <span class="w-1/5 text-right">Yeni Fiyat</span>
                        <span class="w-1/5 text-right">Kampanyalı Fiyat</span>

                    <form id="bulkUpdateForm" class="flex flex-col gap-2 max-h-[40vh] overflow-y-auto pr-1"></form>
                    
                    <button id="saveManualPrices" class="mt-6 bg-red-500 text-white px-4 py-3.5 rounded-xl font-black text-base shadow-md hover:bg-red-600 transition w-full">YUKARIDAKİ TÜM FİYATLARI VERİTABANINA İŞLE</button>

            `);

            document.getElementById('bulkCategory').addEventListener('change', () => renderBulkPriceList(document.getElementById('bulkCategory').value));
            document.getElementById('applyBulkAdjustment').addEventListener('click', applyBulkAdjustment);
            document.getElementById('saveManualPrices').addEventListener('click', saveManualPrices);

        function renderBulkPriceList(filter = 'Tümü') {
            const formEl = document.getElementById('bulkUpdateForm');
            if (!formEl) return;
            formEl.innerHTML = '';

            const sortedProducts = sortProductsByOrder([...products]);
            const filtered = filter === 'Tümü' ? sortedProducts : sortedProducts.filter(p => p.category === filter);

            if (filtered.length === 0) {
                formEl.innerHTML = '<p class="p-4 text-center bg-gray-50 rounded-xl text-gray-400 text-xs border border-dashed">Kategoride ürün yok.</p>';
                return;
            }

            filtered.forEach(p => {
                const item = document.createElement('div');
                item.className = 'flex flex-col sm:flex-row justify-between sm:items-center bg-gray-50 p-2.5 rounded-xl border border-gray-100 text-xs sm:text-sm gap-2';
                const existingDiscount = (p.discountPrice !== undefined && p.discountPrice !== null) ? p.discountPrice : "";

                item.innerHTML = `
                    <span class="sm:w-2/5 font-bold text-gray-700 truncate">${p.name}</span>
                    <div class="grid grid-cols-3 sm:flex sm:w-3/5 items-center gap-2 justify-end">
                        <span class="text-right text-gray-400 font-semibold pr-2 self-center sm:w-1/3">${p.price} ₺</span>
                        <div class="sm:w-1/3 flex flex-col"><label class="sm:hidden text-[9px] text-gray-400 font-bold mb-0.5">YENİ ₺</label><input type="number" step="1" placeholder="${p.price}" value="${p.price}" data-key="${p.key}" class="bulk-price-input text-right border p-1 rounded-lg bg-white font-bold outline-none focus:border-orange-500 w-full" /></div>
                        <div class="sm:w-1/3 flex flex-col"><label class="sm:hidden text-[9px] text-orange-400 font-bold mb-0.5">İNDİRİM ₺</label><input type="number" step="1" placeholder="Yok" value="${existingDiscount}" data-key="${p.key}" class="bulk-discount-input text-right border p-1 rounded-lg bg-orange-100/50 font-black text-orange-700 outline-none focus:border-orange-500 w-full" /></div>
                    </div>
                `;
                formEl.appendChild(item);
            });
        }

        function applyBulkAdjustment() {
            const updateType = document.querySelector('input[name="updateType"]:checked').value;
            const value = parseFloat(document.getElementById('updateValue').value);
            const statusEl = document.getElementById('bulkStatus');
            if (isNaN(value) || value === 0) { alert('Lütfen miktar giriniz.'); return; }

            const priceInputs = document.querySelectorAll('#bulkUpdateForm .bulk-price-input');
            priceInputs.forEach(input => {
                const currentProduct = products.find(p => p.key === input.dataset.key);
                if (!currentProduct) return;
                let newPrice = updateType === 'percent' ? currentProduct.price * (1 + (value / 100)) : currentProduct.price + value;
                input.value = parseFloat(Math.max(0, newPrice).toFixed(2));
            });
            statusEl.textContent = 'Fiyatlar geçici olarak listeye uygulandı. Aşağıdaki kırmızı butondan kalıcı kaydedebilirsiniz.';
            statusEl.className = 'mt-3 text-center text-xs font-bold text-orange-600';
            statusEl.classList.remove('hidden');
        }

        async function saveManualPrices() {
            const priceInputs = document.querySelectorAll('#bulkUpdateForm .bulk-price-input');
            const discountInputs = document.querySelectorAll('#bulkUpdateForm .bulk-discount-input');
            const updates = {};
            const currentTime = Date.now();
            const statusEl = document.getElementById('bulkStatus');
            let changesMade = 0;
            const pathPrefix = currentMenuType === 'in_place' ? inPlaceProductsPath : deliveryProductsPath;

            if (priceInputs.length === 0) return;

            priceInputs.forEach((input, index) => {
                const productKey = input.dataset.key;
                const newPrice = parseFloat(input.value);
                const discountInput = discountInputs[index];
                const discountValueStr = discountInput ? discountInput.value.trim() : "";
                const newDiscountPrice = discountValueStr !== "" ? parseFloat(discountValueStr) : null;
                const currentProduct = products.find(p => p.key === productKey);

                if (!currentProduct || isNaN(newPrice) || newPrice < 0) return;

                const currentPriceRounded = parseFloat(currentProduct.price.toFixed(2));
                const newPriceRounded = parseFloat(newPrice.toFixed(2));
                const currentDiscountRounded = currentProduct.discountPrice ? parseFloat(currentProduct.discountPrice.toFixed(2)) : null;
                const newDiscountRounded = newDiscountPrice !== null ? parseFloat(newDiscountPrice.toFixed(2)) : null;

                let changed = false;
                if (currentPriceRounded !== newPriceRounded) { updates[`${pathPrefix}/${productKey}/price`] = newPriceRounded; changed = true; }
                if (currentDiscountRounded !== newDiscountRounded) { updates[`${pathPrefix}/${productKey}/discountPrice`] = newDiscountRounded; changed = true; }

                if (changed) { updates[`${pathPrefix}/${productKey}/lastUpdated`] = currentTime; changesMade++; }
            });

            if (changesMade === 0) { alert('Herhangi bir değişiklik bulunamadı.'); return; }
            if (!confirm(`${changesMade} ürün güncellenecektir. Onaylıyor musunuz?`)) return;

            try {
                await database.ref().update(updates);
                statusEl.textContent = 'Tüm fiyatlar ve indirim bilgileri başarıyla kaydedildi!';
                statusEl.className = 'mt-4 text-center text-xs font-bold text-emerald-600';
                statusEl.classList.remove('hidden');
                renderBulkPriceList(document.getElementById('bulkCategory').value);
            } catch (error) { alert("Hata: " + error.message); }
        }

        function renderStatsModule() {
            setActiveTab('showStats');
            loadModule(`
                <div class="bg-white rounded-2xl shadow-sm p-4 sm:p-6 border border-orange-100 animate-pop-in max-w-xl mx-auto">
                    <h2 class="text-2xl font-black text-gray-800 mb-4 flex items-center gap-1">📊 Menü Görüntüleme İstatistikleri</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-orange-50/50 p-4 border border-orange-100 rounded-2xl text-center">
                            <h3 class="text-xs font-bold text-gray-400 uppercase mb-1">Bugün</h3>
                            <p id="todayCount" class="text-3xl font-black text-orange-600">0</p>
                        </div>
                        <div class="bg-orange-50/50 p-4 border border-orange-100 rounded-2xl text-center">
                            <h3 class="text-xs font-bold text-gray-400 uppercase mb-1">Toplam Görüntüleme</h3>
                            <p id="totalCount" class="text-3xl font-black text-orange-600">0</p>
                        </div>
                    </div>
                    <button id="resetCounter" class="mt-5 bg-red-50 text-red-600 border border-red-100 px-4 py-2 text-xs font-bold rounded-xl w-full active:scale-95 transition">Sayaçları Sıfırla (Tüm Zamanlar)</button>
                </div>
            `);
            fetchVisitorCounts();
            document.getElementById('resetCounter').addEventListener('click', resetVisitorCounts);
        }

        function renderGlobalDateModule() {
            setActiveTab('showGlobalDateUpdate');
            const todayStr = new Date().toISOString().slice(0, 10);
            loadModule(`
                <div class="bg-white rounded-2xl shadow-sm p-4 sm:p-6 border border-orange-100 animate-pop-in max-w-md mx-auto">
                    <h2 class="text-2xl font-black text-gray-800 mb-2 flex items-center gap-1">📅 Ortak Tarih Güncellemesi</h2>
                    <p class="mb-4 text-xs text-gray-500">Seçeceğiniz tarih, hem Yerinde hem de Paket servis menüsündeki tüm ürünlerin fiyat değişim tarihi olarak tek seferde basılır.</p>
                    <input id="globalDateInput" type="date" value="${todayStr}" class="border-2 border-gray-100 p-3 rounded-xl w-full mb-4 outline-none focus:border-orange-500 font-bold text-sm bg-gray-50" />
                    <button id="applyGlobalDateBtn" class="bg-orange-600 text-white px-4 py-3.5 rounded-xl font-bold w-full shadow-md active:scale-95 transition">Tarihleri Tüm Ürünlere Eşitle</button>
                    <p id="globalDateStatus" class="mt-3 text-center text-xs font-bold hidden"></p>
                </div>
            `);
            document.getElementById('applyGlobalDateBtn').addEventListener('click', saveGlobalDateToAllProducts);
        }

        async function saveGlobalDateToAllProducts() {
            const dateInput = document.getElementById('globalDateInput').value;
            const statusEl = document.getElementById('globalDateStatus');
            if (!dateInput) return;

            const targetTimestamp = new Date(dateInput).getTime();
            if (!confirm("Tüm ürünlerin fiyat güncelleme tarihleri değiştirilecektir. Emin misiniz?")) return;

            try {
                statusEl.textContent = 'Güncelleniyor...'; statusEl.className = 'mt-3 text-center text-xs font-bold text-orange-600'; statusEl.classList.remove('hidden');
                const inPlaceSnapshot = await database.ref(inPlaceProductsPath).once('value');
                const deliverySnapshot = await database.ref(deliveryProductsPath).once('value');
                const inPlaceData = inPlaceSnapshot.val() || {};
                const deliveryData = deliverySnapshot.val() || {};

                const updates = {};
                let count = 0;
                Object.keys(inPlaceData).forEach(k => { updates[`${inPlaceProductsPath}/${k}/lastUpdated`] = targetTimestamp; count++; });
                Object.keys(deliveryData).forEach(k => { updates[`${deliveryProductsPath}/${k}/lastUpdated`] = targetTimestamp; count++; });

                if (count === 0) { statusEl.textContent = 'Ürün bulunamadı.'; return; }
                await database.ref().update(updates);
                statusEl.textContent = 'Tüm ürün tarihleri başarıyla güncellendi!';
                statusEl.className = 'mt-3 text-center text-xs font-bold text-emerald-600';
                setFirebaseRefs(currentMenuType);
            } catch (error) { alert("Hata: " + error.message); }
        }

        function fetchVisitorCounts() {
            const today = new Date().toISOString().slice(0, 10);
            visitorsRef.child(today).once('value', s => { const val = document.getElementById('todayCount'); if(val) val.textContent = s.val() || 0; });
            visitorsRef.once('value', s => { let total = 0; s.forEach(c => { total += c.val(); }); const val = document.getElementById('totalCount'); if(val) val.textContent = total; });
        }

        async function resetVisitorCounts() {
            if (confirm("Ziyaretçi verileri sıfırlanacaktır?")) {
                try { await visitorsRef.remove(); fetchVisitorCounts(); } catch (error) { alert(error.message); }
            }
        }

        function openEditModal(productKey) {
            const productToEdit = products.find(p => p.key === productKey);
            if (productToEdit) {
                document.getElementById('editProductKey').value = productKey;
                document.getElementById('editName').value = productToEdit.name;
                document.getElementById('editNameEN').value = productToEdit.nameEN || '';
                document.getElementById('editDesc').value = productToEdit.desc || '';
                document.getElementById('editDescEN').value = productToEdit.descEN || '';
                document.getElementById('editPrice').value = productToEdit.price;

                const select = document.getElementById('editCategory');
                select.innerHTML = categoriesTR.map(cat => `<option value="${cat}">${cat}</option>`).join('');
                select.value = productToEdit.category;

                editImageURLInput.value = productToEdit.image;
                editImagePreview.src = productToEdit.image || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="gray"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 002-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>';
                editProductModal.classList.remove('hidden');
            }
        }

        let activeListeners = {};
        function stopAllListeners() {
            if (activeListeners.products && productsRef) productsRef.off('value', activeListeners.products);
            if (activeListeners.campaigns && campaignsRef) campaignsRef.off('value', activeListeners.campaigns);
            if (activeListeners.campaignPriceText && campaignInfoRef) campaignInfoRef.child('price_text').off('value', activeListeners.campaignPriceText);
            if (activeListeners.priceBoxUrl && priceBoxUrlRef) priceBoxUrlRef.off('value', activeListeners.priceBoxUrl);
            activeListeners = {};
        }

        function setupDataListeners() {
            activeListeners.products = productsRef.on('value', (s) => {
                products = [];
                s.forEach(c => { const p = c.val(); p.key = c.key; products.push(p); });
                refreshActiveModule();
            });

            activeListeners.campaigns = campaignsRef.on('value', (s) => {
                campaignUrls = [];
                s.forEach(c => { const camp = c.val(); camp.key = c.key; campaignUrls.push(camp); });
                if (document.getElementById('sortableCampaignList')) renderCampaignList();
            });

            activeListeners.campaignPriceText = campaignInfoRef.child('price_text').on('value', (s) => {
                campaignPriceText = s.val() || "";
            });
        }

        // --- DOM HAZIR OLDUĞUNDA TETİKLE ---
        document.addEventListener('DOMContentLoaded', () => {
            const loginOverlay = document.getElementById('adminLoginOverlay');
            const usernameInput = document.getElementById('panelUsername');
            const passwordInput = document.getElementById('panelPassword');
            const loginError = document.getElementById('panelLoginError');
            const submitLoginBtn = document.getElementById('submitPanelLoginBtn');

            if (sessionStorage.getItem('olimpiyat_admin_logged_in') === 'true') loginOverlay.classList.add('hidden');

            function handleAdminLogin() {
                if (usernameInput.value.trim() === 'Olimpiyat' && passwordInput.value === 'Olimpiyatkoko34.') {
                    loginError.classList.add('hidden');
                    sessionStorage.setItem('olimpiyat_admin_logged_in', 'true');
                    loginOverlay.classList.add('hidden');
                } else {
                    loginError.classList.remove('hidden'); passwordInput.value = ''; passwordInput.focus();
                }
            }

            submitLoginBtn.addEventListener('click', handleAdminLogin);
            [usernameInput, passwordInput].forEach(i => i.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAdminLogin(); }));

            setFirebaseRefs('in_place');

            showProductsBtn.addEventListener('click', renderProductsModule);
            showSortingBtn.addEventListener('click', renderSortingModule);
            showCampaignsBtn.addEventListener('click', renderCampaignModule);
            showAddProductBtn.addEventListener('click', renderAddProductModule);
            showBulkUpdateBtn.addEventListener('click', renderBulkUpdateModule);
            showStatsBtn.addEventListener('click', renderStatsModule);
            document.getElementById('showGlobalDateUpdate').addEventListener('click', renderGlobalDateModule);

            document.getElementById('switchToInPlace').addEventListener('click', () => setFirebaseRefs('in_place'));
            document.getElementById('switchToDelivery').addEventListener('click', () => setFirebaseRefs('delivery'));
            document.getElementById('copyToDeliveryBtn').addEventListener('click', copyMenuDataToDelivery);

            closeEditProductModal.addEventListener('click', () => editProductModal.classList.add('hidden'));
            uploadEditImageBtn.addEventListener('click', (e) => { e.preventDefault(); openCloudinaryWidget(editImageURLInput, editImagePreview); });

            // Sol menüdeki çıkış butonu dinleyicisi
            const logoutBtn = document.querySelector('a[href="index.html"]');
            if (logoutBtn) logoutBtn.addEventListener('click', () => sessionStorage.removeItem('olimpiyat_admin_logged_in'));

            saveEditProductButton.addEventListener('click', async () => {
                const productKey = document.getElementById('editProductKey').value;
                const newPrice = parseFloat(document.getElementById('editPrice').value);
                if (isNaN(newPrice)) return;

                const currentProduct = products.find(p => p.key === productKey);
                const isPriceChanged = currentProduct && parseFloat(currentProduct.price.toFixed(2)) !== parseFloat(newPrice.toFixed(2));

                const updates = {
                    name: document.getElementById('editName').value.trim(),
                    nameEN: document.getElementById('editNameEN').value.trim(),
                    desc: document.getElementById('editDesc').value.trim(),
                    descEN: document.getElementById('editDescEN').value.trim(),
                    price: newPrice,
                    category: document.getElementById('editCategory').value,
                    image: editImageURLInput.value.trim()
                };

                if (isPriceChanged) updates.lastUpdated = Date.now();
                else if (currentProduct) updates.lastUpdated = currentProduct.lastUpdated;

                try {
                    await updateProductInFirebase(productKey, updates);
                    editProductModal.classList.add('hidden');
                    alert("Ürün başarıyla güncellendi.");
                } catch (error) { alert("Hata: " + error.message); }
            });
        });
    </script>
